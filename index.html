<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justin Stewart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #d4d4d4;
      font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      text-align: center;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #e8e8e8;
    }

    p {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.05em;
    }

    a {
      display: inline-block;
      margin-top: 2.5rem;
      color: #333;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Justin Stewart</h1>
    <p>I build software.</p>
    <a href="https://www.linkedin.com/in/justinstewart1/">in →</a>
  </div>
</body>
</html>
